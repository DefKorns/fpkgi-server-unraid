<!doctype html>
<html lang="pt"
      class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>PlayStation Library</title>

    <script src="https://cdn.tailwindcss.com/3.4.3"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>

    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-white transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8">
            <h1 id="title"
                class="text-3xl font-bold">🎮 PlayStation Library</h1>

            <div class="flex flex-wrap gap-3 items-center">

                <select id="langToggle"
                        class="px-3 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800">
                    <option value="pt">PT</option>
                    <option value="en">EN</option>
                </select>

                <button id="themeToggle"
                        class="px-4 py-2 rounded-lg bg-sky-500 dark:bg-indigo-600 text-white hover:opacity-80 transition">
                    🌙
                </button>
            </div>
        </div>

        <div class="grid md:grid-cols-4 gap-4 mb-6">
            <input id="searchInput"
                   class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800"
                   placeholder="Search..." />

            <select id="categoryFilter"
                    class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800">
                <option value="ALL">All</option>
                <option value="GAMES">Games</option>
                <option value="UPDATES">Updates</option>
                <option value="DLC">DLC</option>
            </select>

            <select id="regionFilter"
                    class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800">
                <option value="ALL">All Regions</option>
                <option value="USA">USA</option>
                <option value="EUR">EUR</option>
                <option value="JAP">JAP</option>
            </select>

            <select id="sortFilter"
                    class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800">
                <option value="name">Sort Name</option>
                <option value="title_id">Sort ID</option>
                <option value="region">Sort Region</option>
            </select>
        </div>

        <div id="counter"
             class="mb-6 text-sm text-zinc-500 dark:text-zinc-400"></div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div id="counter"
                 class="text-sm text-zinc-500 dark:text-zinc-400"></div>

            <select id="perPage"
                    class="px-3 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-800 text-sm">
                <option value="12">12</option>
                <option value="24"
                        selected>24</option>
                <option value="48">48</option>
                <option value="96">96</option>
            </select>
        </div>

        <div id="grid"
             class="grid gap-6"
             style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr))"></div>

        <div id="pagination"
             class="flex justify-center items-center gap-2 mt-10"></div>
    </div>

    <script>
        const translations = {
            pt: {
                search: 'Pesquisar...',
                allRegions: 'Todas as Regiões',
                results: 'resultados encontrados',
                categories: {
                    ALL: 'Todos',
                    GAMES: 'Jogos',
                    UPDATES: 'Atualizações',
                    DLC: 'DLC',
                },
                sort: {
                    name: 'Ordenar por Nome',
                    title_id: 'Ordenar por ID',
                    region: 'Ordenar por Região',
                },
            },
            en: {
                search: 'Search...',
                allRegions: 'All Regions',
                results: 'results found',
                categories: {
                    ALL: 'All',
                    GAMES: 'Games',
                    UPDATES: 'Updates',
                    DLC: 'DLC',
                },
                sort: {
                    name: 'Sort by Name',
                    title_id: 'Sort by ID',
                    region: 'Sort by Region',
                },
            },
        };

        let lang = localStorage.getItem('lang') || 'pt';
        document.getElementById('langToggle').value = lang;

        function applyLang() {
            document.getElementById('searchInput').placeholder = translations[lang].search;

            document.querySelector("#regionFilter option[value='ALL']").textContent =
                translations[lang].allRegions;

            const categorySelect = document.getElementById('categoryFilter');
            categorySelect.querySelector("option[value='ALL']").textContent =
                translations[lang].categories.ALL;
            categorySelect.querySelector("option[value='GAMES']").textContent =
                translations[lang].categories.GAMES;
            categorySelect.querySelector("option[value='UPDATES']").textContent =
                translations[lang].categories.UPDATES;
            categorySelect.querySelector("option[value='DLC']").textContent =
                translations[lang].categories.DLC;

            const sortSelect = document.getElementById('sortFilter');
            sortSelect.querySelector("option[value='name']").textContent =
                translations[lang].sort.name;
            sortSelect.querySelector("option[value='title_id']").textContent =
                translations[lang].sort.title_id;
            sortSelect.querySelector("option[value='region']").textContent =
                translations[lang].sort.region;
        }
        applyLang();

        document.getElementById('langToggle').addEventListener('change', (e) => {
            lang = e.target.value;
            localStorage.setItem('lang', lang);
            applyLang();
        });

        function applyTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        }
        applyTheme();

        document.getElementById('themeToggle').addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
            applyTheme();
        });

        const sources = {
            GAMES: 'GAMES.json',
            UPDATES: 'UPDATES.json',
            DLC: 'DLC.json',
        };

        let fullData = [];
        let currentPage = 1;
        let itemsPerPage = 24;

        document.getElementById('categoryFilter').value = 'GAMES';

        async function loadAll() {
            for (const category in sources) {
                try {
                    const res = await fetch(sources[category]);
                    const json = await res.json();

                    const items = Object.entries(json.DATA).map(([url, data]) => ({
                        category,
                        url,
                        ...data,
                    }));

                    fullData = fullData.concat(items);
                } catch { }
            }

            render();
        }

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value || 'GAMES';
            const region = document.getElementById('regionFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let filtered = fullData.filter((item) => {
                const matchSearch =
                    item.name?.toLowerCase().includes(search) ||
                    item.title_id?.toLowerCase().includes(search);

                const matchCategory = category === 'ALL' || item.category === category;

                const matchRegion = region === 'ALL' || item.region === region;

                return matchSearch && matchCategory && matchRegion;
            });

            filtered.sort((a, b) => {
                return (a[sort] || '').localeCompare(b[sort] || '');
            });

            currentPage = 1;
            updatePagination(filtered);
            drawPage(filtered);
        }

        function drawPage(filtered) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filtered.slice(start, end);

            pageItems.forEach((game) => {
                const card = document.createElement('div');
                card.className =
                    'group bg-white dark:bg-zinc-900 rounded-xl overflow-hidden shadow hover:scale-105 transition fade-in';
                card.innerHTML = `
        <div class="overflow-hidden">
            <img data-src="${game.cover_url || 'https://via.placeholder.com/300x400'}"
                class="lazy-image w-full h-60 object-cover opacity-0 transition duration-500 
                hover:scale-110"
                loading="lazy">
        </div>
        <div class="p-4">
          <h2 class="font-semibold truncate">${game.name}</h2>
          <p class="text-xs text-zinc-500 dark:text-zinc-400 mt-1">
            ${game.title_id}
          </p>
          <div class="flex justify-between mt-2">
            <span class="text-xs bg-sky-500 dark:bg-indigo-600 text-white px-2 py-1 rounded">
              ${game.region || 'UNK'}
            </span>
            <span class="text-xs text-zinc-500 dark:text-zinc-400">
              ${translations[lang].categories[game.category] || game.category}
            </span>
          </div>
        </div>
        `;
                grid.appendChild(card);
            });

            document.getElementById('counter').textContent =
                `${filtered.length} ${translations[lang].results}`;

            observeImages();
        }

        function updatePagination(filtered) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = Math.ceil(filtered.length / itemsPerPage);

            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;

                btn.className = `px-3 py-1 rounded text-sm ${i === currentPage
                    ? 'bg-sky-500 dark:bg-indigo-600 text-white'
                    : 'bg-zinc-200 dark:bg-zinc-800'
                    }`;

                btn.addEventListener('click', () => {
                    currentPage = i;
                    drawPage(filtered);
                    updatePagination(filtered);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                pagination.appendChild(btn);
            }
        }

        // Lazy Loading real
        const imageObserver = new IntersectionObserver(
            (entries, observer) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) return;

                    const img = entry.target;
                    img.src = img.dataset.src;

                    img.onload = () => {
                        img.classList.remove('opacity-0');
                    };

                    observer.unobserve(img);
                });
            },
            {
                rootMargin: '100px',
            },
        );

        function observeImages() {
            document.querySelectorAll('.lazy-image').forEach((img) => {
                imageObserver.observe(img);
            });
        }

        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('categoryFilter').addEventListener('change', render);
        document.getElementById('regionFilter').addEventListener('change', render);
        document.getElementById('sortFilter').addEventListener('change', render);
        document.getElementById('perPage').addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            render();
        });
        loadAll();
    </script>
</body>

</html>
