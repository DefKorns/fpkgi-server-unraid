name: Build and Publish GHCR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Login GHCR
        run: echo "${{ secrets.API_KEY }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/fpkgi-server:latest .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}/fpkgi-server:latest